    <script>
        const texts= {

            en: `    <h2 align="center">Hello!</h2>
    <p>This is <i>Toolkit</i>! A learning/resource environment, and brainchild of Jayden. This is not meant to teach you everything there is to know about what the Hillsong NJ production team does. <br> However, at the same time, it is a resource for you to learn about devices in your nearby surroundings that you may not have known anything about previously. </p>
   
    <p align="center"> The verse that this idea is based upon is that of Proverbs 10:14 (NIV): </p>
    <p align="center"> <i>"The wise store up knowledge, but the mouth of a fool invites ruin."</i> </p>
    <p align="center"> The intention is for all of you to store this knowledge up in your minds like seeds in the ground. So that one day it may bear much fruit for you and everyone around you to enjoy!</p>

    <p class="ending_note"><i class="ending_note" style="color: white;">-Jayden Rodriguez</i></p> 
     <img class="img_container" src="./AdobeStock_479292548.png" alt="Italian Trulli" style="float:center; width:15em; height:15em;">


            `, 
            es: `<h2 align="center">¡Hola!</h2>
<p>¡Este es <i>Toolkit</i>! Un espacio de aprendizaje y recursos creado por Jayden. No está pensado para enseñarte todo sobre lo que hace el equipo de produccion de Hillsong NJ. <br> Mas bien, es una herramienta para ayudarte a conocer los dispositivos a tu alrededor que quizás no conocías antes.</p>

<p align="center">Esta idea se inpira en Proverbios 10:14:</p>
<p align="center"><i>"Los sabios guardan el conocimiento, pero la boca del necio causa su ruina."</i></p>
<p align="center">El objectivo es que almacenes este conocimiento en tu mente como semillas en la tierra, para que algún día puede crecer y dar fruto que rodean puedan disfrutar.</p>

<p class="ending_note"><i class="ending_note" style="color: white;">-Jayden Rodriguez</i></p>
<img class="img_container" src="./AdobeStock_479292548.png" alt="Italian Trulli" style="float:center; width:15em; height:15em;">

           function setLanguage(lang) {
          document.getElementById('contentContainer').innerHTML = texts[lang];

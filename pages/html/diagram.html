<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    <style>
        button {
            padding: .5em 1.5em;
            background: #0073e6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #005bb5;
        }

        body, html {
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #333;
        }
        .rack-container {
            display: flex;
            justify-content: center;         
        }

        .rack {
            display: flex;
            border: .5em solid #bfbfbf;
            padding: 1em;
            width: 95%;
            max-width: 900px;
            border-radius: 3em;
        }
        .server-container {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        .server {
            position: relative;
            background-color: #3d9eff;
            border: .05em solid #666;
            margin: .25em 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18pt;
            position: relative;
            height: 3em;
            border-radius: .3em;
            transition: transform 0.3s;
        }

        .server:active {
            transform: scale(.98);
        }

        .serverdrop-content {
            color: white;
            display: none;
            position: absolute;
            background-color: #737373;
            width: 13em;
            padding: 1em 1.2em;
            z-index: 1;
            left: 100%;
            border-radius: .5em;
        }
        .server:hover {
            transform: translateY(-.2em);
        }
        .server:hover .serverdrop-content {
            display: block;
        }
        .w3-container {
            background-color: #242424;
        }
        .lang-btn {
            margin: 10px 5px;
        }

        .jays_button{ 
            background-color: #242424;
            color: #3d9eff; 
            padding-top: -2em;
        }
        .jays_button:hover{
            background-color: #2e2e2e;
        }
        .w3-dropdown-content{ 
            background-color: #242424;
            color: #3d9eff;
        }

        .bar-item {
            font-size: 12.5pt;
            display: block;
            padding: 1em 1.5em;
            background-color: #242424;
            text-decoration: none;
            z-index: 1;
        }
        .bar-item:hover{ 
            background-color: #2e2e2e;
        }
        @media (max-width:600px){

        h2{
            font-size:24px !important;
        }

        .server{
            font-size:14px;
            height:44px;
        }

        .serverdrop-content{
            font-size:14px;
        }

        }


        
    </style>

    <script>
        document.addEventListener("click", function(e){

        const server = e.target.closest(".server");

        document.querySelectorAll(".server").forEach(s=>{
            if(s !== server){
                s.classList.remove("active");
            }
        });

        if(server){
            server.classList.toggle("active");
        }

        });

    </script>
    <title>Toolkit</title>
</head>
<body>
<div class="w3-container">
    <h2 style="display: block; block-size: 0em; text-align: center; font-size: 32pt; color: #3d9eff; font-family: Geneva;"><center>ToolKit</center></h2>

    <div class="w3-dropdown-hover">
        <button class="jays_button"><a class="fa fa-bars w3-xxlarge"></a></button>
        <div class="w3-dropdown-content w3-bar-block w3-card-4">
            <a href="../../index.html" class="bar-item"> <center> Home </center> </a>
            <a href="./Atem_Software_diagram_translated.html" class="bar-item"> <center> Atem Software </center></a>
            <a href="./Propresenter_7_diagram_translated.html" class="bar-item"><center> Propresenter </center></a>
            <a href="./definitions.html" class="bar-item"><center> Vocabulary </center> </a>
        </div>
    </div>
</div>
     <div style="text-align:right; margin-top: none;">
      <button class="lang-btn" onclick="setLanguage('en')">English</button>
      <button class="lang-btn" onclick="setLanguage('es')">Español</button>
    </div>

    <div id="contentContainer" class="content">

`, 

    es: `</div>
<div class="rack-container">

            <div class="server">
                <a style="text-decoration: none; color: black;"><i class="fas fa-server"> Power Strip</i></a>

           function setLanguage(lang) {
          document.getElementById('contentContainer').innerHTML = texts[lang];
        }

        setLanguage('en');
</script>

</body>
</html>
